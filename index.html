function App(){
  const saved=loadSave();
  const[tab,setTab]=useState("study");
  const[screen,setScreen]=useState("home");
  const[bookId,setBookId]=useState(null);
  const[lessonNum,setLessonNum]=useState(null);
  const[activeMode,setActiveMode]=useState(null);
  const[modeWords,setModeWords]=useState(null);
  const[finalWords,setFinalWords]=useState(null);
  const[gameId,setGameId]=useState(null);
  const[gameBookId,setGameBookId]=useState(null);
  const[xp,setXp]=useState(saved?.xp??0);
  const[done,setDone]=useState(saved?.done??{});
  const[lastPct,setLastPct]=useState(0);
  const[lastXP,setLastXP]=useState(0);
  const[lastStars,setLastStars]=useState(1);
  const[owned,setOwned]=useState(saved?.owned??{});
  const[placed,setPlaced]=useState(saved?.placed??[]);
  const[customWords,setCustomWords]=useState(loadCustomWords);
  const[editingWords,setEditingWords]=useState(null);

  useEffect(()=>{
    try{localStorage.setItem(SAVE_KEY,JSON.stringify({xp,done,owned,placed}));}catch{}
  },[xp,done,owned,placed]);

  const goHome=()=>setScreen("home");

  function handleReset(){
    setXp(0);
    setDone({});
    setOwned({});
    setPlaced([]);
    try{localStorage.removeItem(SAVE_KEY);}catch{}
    try{localStorage.removeItem(DEFS_KEY);}catch{}
    setScreen("home");
  }

  function handleResult(mode,pct){
    const stars=calcStars(pct);
    const earned=calcXP(mode,pct);
    const key=`${bookId}-${lessonNum}`;
    const prev=done[key];
    if(!prev||stars>prev.stars)setDone(d=>({...d,[key]:{stars,xp:earned}}));
    setXp(x=>x+earned);
    setLastPct(pct);setLastXP(earned);setLastStars(stars);
    setScreen("result");
  }

  function handleFinalQuizDone(stars,earned){
    const key=`fq-${bookId}-${lessonNum}`;
    const prev=done[key];
    if(!prev||stars>prev.stars) setDone(d=>({...d,[key]:{stars,xp:earned}}));
    setXp(x=>x+earned);
    setScreen("lesson");
  }

  function handleBookTestDone(stars,earned){
    const key=`bt-${bookId}`;
    const prev=done[key];
    if(!prev||stars>prev.stars) setDone(d=>({...d,[key]:{stars,xp:earned}}));
    setXp(x=>x+earned);
    setScreen("book");
  }

  function handleGameDone(earned, sticker){
    setXp(x=>x+earned);
    if(sticker) setOwned(o=>({...o,[sticker.id]:(o[sticker.id]||0)+1}));
    setScreen("games");
  }

  function startGame(gId, bId){
    setGameId(gId); setGameBookId(bId); setScreen("game");
  }

  function handleBuy(sticker){
    setXp(x=>x-sticker.cost);
    setOwned(o=>({...o,[sticker.id]:(o[sticker.id]||0)+1}));
  }
  function handlePlace(ps){
    setPlaced(p=>[...p,ps]);
    setOwned(o=>({...o,[ps.stickerId]:Math.max(0,(o[ps.stickerId]||0)-1)}));
  }
  function handleMove(uid,xPct,yPct){setPlaced(p=>p.map(s=>s.uid===uid?{...s,xPct,yPct}:s));}
  function handleDelete(uid){
    const ps=placed.find(s=>s.uid===uid);
    setPlaced(p=>p.filter(s=>s.uid!==uid));
    if(ps)setOwned(o=>({...o,[ps.stickerId]:(o[ps.stickerId]||0)+1}));
  }

  function handleEditWords(words){
    setEditingWords(words);
    setScreen("editor");
  }
  function handleSaveWords(words){
    const key=`${bookId}-${lessonNum}`;
    let updated;
    if(words===null){
      const{[key]:_,...rest}=customWords;
      updated=rest;
    } else {
      updated={...customWords,[key]:words};
    }
    setCustomWords(updated);
    saveCustomWords(updated);
    setScreen("lesson");
  }

  const book=bookId?BOOKS.find(b=>b.id===bookId):null;
  const isGameScreen=screen==="game";
  const isDeepScreen=["mode","lesson_final","book_test","editor","game"].includes(screen);

  return(
    <>
      <style>{css}</style>
      <div className="app" style={book?{"--acc":book.color,"--acc-rgb":book.rgb}:{}}>
        <StarField/>
        {screen==="home"&&<HomeScreen done={done} xp={xp} customWords={customWords} onBook={id=>{setBookId(id);setScreen("book");}} onStore={()=>setScreen("store")} onStickerBook={()=>setScreen("stickerbook")} onReset={handleReset}/>}
        {screen==="games"&&<GameZoneScreen xp={xp} onGame={startGame}/>}
        {screen==="book"&&<BookScreen bookId={bookId} done={done} customWords={customWords} xp={xp} onBack={()=>setScreen("home")} onLesson={n=>{setLessonNum(n);setScreen("lesson");}} onBookTest={()=>setScreen("book_test")}/>}
        {screen==="lesson"&&<LessonScreen bookId={bookId} lessonNum={lessonNum} done={done} customWords={customWords} xp={xp} onBack={()=>setScreen("book")} onMode={(m,w)=>{setActiveMode(m);setModeWords(w);setScreen("mode");}} onEdit={handleEditWords} onFinalQuiz={w=>{setFinalWords(w);setScreen("lesson_final");}}/>}
        {screen==="editor"&&<WordEditor bookId={bookId} lessonNum={lessonNum} initialWords={editingWords} customWords={customWords} onSave={handleSaveWords} onCancel={()=>setScreen("lesson")}/>}
        {screen==="mode"&&activeMode==="flashcard"&&<FlashcardMode bookId={bookId} words={modeWords} xp={xp} onBack={()=>setScreen("lesson")} onResult={handleResult}/>}
        {screen==="mode"&&activeMode==="quiz"     &&<QuizMode      bookId={bookId} words={modeWords} xp={xp} onBack={()=>setScreen("lesson")} onResult={handleResult}/>}
        {screen==="mode"&&activeMode==="match"    &&<MatchMode     bookId={bookId} words={modeWords} xp={xp} onBack={()=>setScreen("lesson")} onResult={handleResult}/>}
        {screen==="mode"&&activeMode==="spell"    &&<SpellMode     bookId={bookId} words={modeWords} xp={xp} onBack={()=>setScreen("lesson")} onResult={handleResult}/>}
        {screen==="lesson_final"&&<FinalQuizScreen words={finalWords} book={book}
          title={`${book?.icon} Book ${bookId} · Lesson ${lessonNum} Final Quiz`}
          totalQ={10} xpTable={[500,300,150]}
          onBack={()=>setScreen("lesson")} onDone={handleFinalQuizDone}/>}
        {screen==="book_test"&&<BookTestScreen bookId={bookId} book={book} customWords={customWords}
          onBack={()=>setScreen("book")} onDone={handleBookTestDone}/>}
        {screen==="result"&&<ResultScreen bookId={bookId} pct={lastPct} xpEarned={lastXP} stars={lastStars} onRetry={()=>setScreen("mode")} onContinue={()=>setScreen("lesson")}/>}
        {screen==="store"&&<StickerStore xp={xp} owned={owned} onBuy={handleBuy} onBack={()=>setScreen("home")}/>}
        {screen==="stickerbook"&&<StickerBook owned={owned} placed={placed} onPlace={handlePlace} onMove={handleMove} onDelete={handleDelete} onBack={()=>setScreen("home")} xp={xp}/>}
        {screen==="game"&&gameId==="blitz"   &&<WordBlitz    bookId={gameBookId} xp={xp} onBack={()=>setScreen("games")} onDone={handleGameDone}/>}
        {screen==="game"&&gameId==="scramble"&&<ScrambleGame bookId={gameBookId} xp={xp} onBack={()=>setScreen("games")} onDone={handleGameDone}/>}
        {screen==="game"&&gameId==="tof"     &&<TrueOrFalse  bookId={gameBookId} xp={xp} onBack={()=>setScreen("games")} onDone={handleGameDone}/>}
        {screen==="game"&&gameId==="bomber"  &&<SpaceBomber  bookId={gameBookId} xp={xp} onBack={()=>setScreen("games")} onDone={handleGameDone}/>}

        {/* Bottom nav — shown on home/games, hidden during deep screens */}
        {!isDeepScreen&&screen!=="result"&&screen!=="store"&&screen!=="stickerbook"&&screen!=="book"&&screen!=="lesson"&&(
          <nav className="bottom-nav">
            <button className={`bnav-btn${tab==="study"?" active":""}`} onClick={()=>{setTab("study");setScreen("home");}}>
              <span className="bnav-icon">📚</span>Study
            </button>
            <button className={`bnav-btn${tab==="games"?" active":""}`} onClick={()=>{setTab("games");setScreen("games");}}>
              <span className="bnav-icon">🎮</span>Games
            </button>
          </nav>
        )}
      </div>
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

  </script>
</body>
</html>
